<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>直播抽奖系统 PRO</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app" id="app">

  <h1 id="mainTitle">直播抽奖系统 PRO</h1>

  <div class="panel">
    <label>抽奖主题</label>
    <input id="title" placeholder="例如：年会抽奖" />
  </div>

  <div class="panel">
    <label>参与人员（每行一个）</label>
    <textarea id="users" placeholder="张三\n李四\n王五"></textarea>
  </div>

  <div class="panel">
    <label>奖品配置（奖品,数量）</label>
    <textarea id="prizes" placeholder="iPhone,1\n红包,5\n鼠标,3"></textarea>
  </div>

  <div class="panel row">
    <button onclick="startDraw()">开始抽奖</button>
    <button onclick="resetDraw()">重置</button>
    <button onclick="toggleFullscreen()">全屏</button>
  </div>

  <div class="panel">
    <label>指定中奖名单（优先）</label>
    <textarea id="manualList" placeholder="张三\n李四"></textarea>
  </div>

  <div class="panel">
    <label>黑名单（不参与抽奖）</label>
    <textarea id="blacklist" placeholder="张三"></textarea>
  </div>

  <div class="result" id="result">
    等待开始抽奖
  </div>

</div>

<div class="admin" id="admin">
  <h3>ADMIN 控制台</h3>
  <button onclick="exportCSV()">导出中奖记录</button>
  <button onclick="clearHistory()">清空记录</button>
</div>

<audio id="beep"></audio>

<script src="app.js"></script>

</body>
</html>
